name: Node.js CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

#     strategy:
#       matrix:
#         node-version: [14.x]

    steps:
      - uses: actions/checkout@v3
      
      - name: pwd
        run: |
          ls /home/runner/work/SeezItt-web-app/SeezItt-web-app/
          
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm i
      - run: npm run build 

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Deploy static site to S3 bucket
        run: |
          # aws s3 sync /home/runner/work/SeezItt-web-app/SeezItt-web-app/ s3://${{ secrets.DEV_S3_BUCKET }} --delete
          aws s3 sync ./dist/ s3://${{ secrets.DEV_S3_BUCKET }} --delete
          
      - name: Run invalidation
        uses: lbertenasco/s3-deploy@v1
        with:
            folder: /home/runner/work/SeezItt-web-app/SeezItt-web-app/dist
            bucket: ${{ secrets.DEV_S3_BUCKET }}
            dist-id: ${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }}
            invalidation: / *
